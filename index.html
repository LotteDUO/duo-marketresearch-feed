<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <title>DUO Market Research Nieuws</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      :root {
        --duo-navy: #003b5c;
        --duo-cyan: #00a6ce;
        --duo-green: #8cc63f;
        --duo-sky: #e8f6fb;
        --duo-bg: #f3f8fb;
        --duo-text: #173042;
        --duo-muted: #5f7482;
        --duo-white: #ffffff;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--duo-bg);
        color: var(--duo-text);
        padding: 20px;
      }

      .page {
        max-width: 1300px;
        margin: 0 auto;
      }

      header {
        margin-bottom: 20px;
        padding: 24px 26px;
        border-radius: 20px;
        background: linear-gradient(135deg, var(--duo-navy), #005b7f);
        box-shadow: 0 14px 34px rgba(0, 59, 92, 0.16);
      }

      header h1 {
        font-size: 2.5rem;
        font-weight: 700;
        color: var(--duo-white);
        letter-spacing: -0.5px;
        margin-bottom: 0.5rem;
      }

      header p {
        font-size: 1.1rem;
        color: #d9f2f8;
      }

      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin: 15px 0;
        align-items: center;
      }

      .filters label {
        font-size: 0.9rem;
        color: var(--duo-navy);
      }

      .filters input[type="text"] {
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid var(--duo-navy);
        min-width: 220px;
        outline: none;
      }

      .filters input[type="text"]:focus {
        border-color: var(--duo-cyan);
        box-shadow: 0 0 0 3px rgba(0, 166, 206, 0.18);
      }

      .multi-select {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .multi-label {
        font-size: 0.9rem;
        color: var(--duo-navy);
      }

      .multi-trigger {
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-width: 220px;
        padding: 8px 12px;
        border: 1px solid var(--duo-navy);
        border-radius: 999px;
        background: var(--duo-white);
        color: var(--duo-navy);
        cursor: pointer;
      }

      .multi-trigger:focus {
        outline: none;
        box-shadow: 0 0 0 3px rgba(0, 166, 206, 0.18);
      }

      .multi-trigger .chev {
        font-size: 0.9rem;
        opacity: 0.8;
      }

      .multi-panel {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        z-index: 50;
        width: min(340px, 90vw);
        max-height: 320px;
        overflow: auto;
        background: var(--duo-white);
        border: 1px solid rgba(0, 59, 92, 0.22);
        border-radius: 16px;
        box-shadow: 0 16px 36px rgba(0, 59, 92, 0.14);
        padding: 10px;
      }

      .multi-actions {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }

      .multi-actions .mini {
        border: 1px solid var(--duo-cyan);
        background: var(--duo-sky);
        color: var(--duo-navy);
        border-radius: 999px;
        padding: 5px 10px;
        font-size: 0.8rem;
        cursor: pointer;
      }

      .multi-options {
        display: grid;
        gap: 6px;
      }

      .multi-option {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 8px;
        border-radius: 10px;
      }

      .multi-option:hover {
        background: rgba(140, 198, 63, 0.18);
      }

      .multi-option input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--duo-navy);
      }

      .multi-option span {
        font-size: 0.9rem;
        color: var(--duo-navy);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 600px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      .card {
        background: var(--duo-white);
        border: 1px solid rgba(0, 59, 92, 0.08);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 8px 22px rgba(0, 59, 92, 0.08);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        cursor: pointer;
      }

      .card:focus-visible {
        outline: 3px solid var(--duo-cyan);
        outline-offset: 2px;
      }

      .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 14px 32px rgba(0, 59, 92, 0.16);
      }

      .card-image {
        width: 100%;
        height: 160px;
        background-size: cover;
        background-position: center;
        background-color: #dceaf1;
      }

      .card-content {
        padding: 14px 16px 16px;
      }

      .card-title {
        font-size: 1.2rem;
        color: var(--duo-navy);
        font-weight: 600;
        line-height: 1.2;
        margin-bottom: 6px;
      }

      .card-meta {
        font-size: 0.8rem;
        color: var(--duo-muted);
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 6px;
      }

      .card-description {
        font-size: 0.85rem;
        color: #3f5665;
        margin-bottom: 10px;
      }

      .card-bottom {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-top: 10px;
      }

      .card-source-chip {
        display: inline-flex;
        align-items: center;
        max-width: 70%;
        padding: 4px 9px;
        border: 1px solid rgba(0, 166, 206, 0.3);
        border-radius: 999px;
        background: var(--duo-sky);
        color: var(--duo-navy);
        font-size: 0.75rem;
        font-weight: 400;
        line-height: 1.2;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .card-readmore {
        font-size: 1rem;
        font-weight: 600;
        margin-right: 6px;
        text-decoration: none;
        color: var(--duo-navy);
        white-space: nowrap;
      }

      .card-readmore:hover {
        color: var(--duo-cyan);
        text-decoration: underline;
      }

      .status {
        margin: 10px 0 8px;
        padding: 10px 12px;
        border-left: 4px solid var(--duo-cyan);
        background: rgba(232, 246, 251, 0.75);
        border-radius: 0 10px 10px 0;
        font-size: 0.85rem;
        color: var(--duo-navy);
      }

      .status.error {
        color: #b42318;
      }

      @media (max-width: 600px) {
        header h1 {
          font-size: 1.5rem;
        }

        .card-image {
          height: 140px;
        }
      }
    </style>
  </head>

  <body>
    <div class="page">
      <header>
        <h1>DUO Market Research Nieuws</h1>
        <p>Berichten uit de HR-sector, automatisch verzameld.</p>
      </header>

      <div class="filters">
        <label>
          Zoeken:
          <input
            type="text"
            id="searchInput"
            placeholder="Filter op titel, tekst of bron…"
          />
        </label>

        <div class="multi-select" id="sourceFilter">
          <span class="multi-label">Bronnen:</span>

          <button
            type="button"
            class="multi-trigger"
            id="sourceTrigger"
            aria-haspopup="listbox"
            aria-expanded="false"
          >
            <span id="sourceTriggerText">Alle bronnen</span>
            <span class="chev">▾</span>
          </button>

          <div
            class="multi-panel"
            id="sourcePanel"
            role="listbox"
            aria-multiselectable="true"
            hidden
          >
            <div class="multi-actions">
              <button type="button" class="mini" id="sourceSelectAll">Alles</button>
              <button type="button" class="mini" id="sourceClear">Geen</button>
            </div>

            <div class="multi-options" id="sourceOptions"></div>
          </div>
        </div>
      </div>

      <div id="status" class="status">Artikelen worden geladen…</div>
      <div id="grid" class="grid"></div>
    </div>

    <script>
      const FEED_URLS = [
        "https://rss.app/feeds/v1.1/_xVAKTNvlHh3E4F0W.json",
      ];

      const MAX_PER_HOST = 12;

      const BLOCKED_HOSTS = new Set([
        "nl.linkedin.com",
        "linkedin.com",
        "www.linkedin.com",
        "facebook.com",
        "www.facebook.com",
        "m.facebook.com",
        "l.facebook.com",
        "fb.com",
        "www.fb.com",
      ]);

      let allArticles = [];
      let activeSources = new Set();
      let searchQuery = "";

      document.addEventListener("DOMContentLoaded", () => {
        fetchFeed();
        setupSearch();
      });

      async function fetchFeed() {
        const statusEl = document.getElementById("status");

        try {
          statusEl.textContent = "Artikelen worden geladen…";

          const results = await Promise.allSettled(
            FEED_URLS.map(async (url) => {
              const response = await fetch(url);

              if (!response.ok) {
                throw new Error(`HTTP ${response.status} voor ${url}`);
              }

              const data = await response.json();
              return data.items || [];
            })
          );

          const combinedItems = results
            .filter((result) => result.status === "fulfilled")
            .flatMap((result) => result.value);

          allArticles = combinedItems.map(mapItemToArticle).filter(Boolean);

          const seen = new Set();
          allArticles = allArticles.filter((article) => {
            if (!article.link || seen.has(article.link)) return false;
            seen.add(article.link);
            return true;
          });

          allArticles.sort(
            (a, b) =>
              new Date(b.pubDate || 0) - new Date(a.pubDate || 0)
          );

          buildSourceDropdown(allArticles);
          renderArticles();

          const failedCount = results.filter(
            (result) => result.status === "rejected"
          ).length;

          statusEl.textContent =
            `Geladen: ${allArticles.length} artikelen.` +
            (failedCount ? ` (${failedCount} feed(s) mislukt)` : "");

          statusEl.classList.remove("error");
        } catch (error) {
          console.error(error);
          statusEl.textContent =
            "Laden is mislukt. Zie de browserconsole voor details.";
          statusEl.classList.add("error");
        }
      }

      function extractHostFromUrl(url) {
        try {
          return new URL(url).hostname.replace(/^www\./, "");
        } catch {
          return "";
        }
      }

      function isBlockedUrl(url) {
        return BLOCKED_HOSTS.has(extractHostFromUrl(url));
      }

      function hostToSourceLabel(host) {
        const map = {
          "chro.nl": "CHRO",
          "hrmorgen.nl": "HRMorgen",
          "hrpraktijk.nl": "HR Praktijk",
          "hrtecharena.nl": "HR Tech Arena",
          "nvp-hrnetwerk.nl": "NVP",
          "pwnet.nl": "PW.",
          "tijdschriftvoorhrm.nl": "Tijdschrift voor HRM",
          "trendsinhr.nl": "Trends in HR",
          "werf-en.nl": "Werf&",
        };

        return map[host] || host;
      }

      function mapItemToArticle(item) {
        const title = item.title || "Zonder titel";
        const link = item.url || "#";

        if (link !== "#" && isBlockedUrl(link)) return null;

        const description = item.content_text || "";
        const pubDate = item.date_published || "";

        let author = "";
        if (
          Array.isArray(item.authors) &&
          item.authors.length > 0 &&
          item.authors[0].name
        ) {
          author = item.authors[0].name;
        }

        const host = extractHostFromUrl(link);

        let image = "";
        if (item.image) {
          image = item.image;
        } else if (
          Array.isArray(item.attachments) &&
          item.attachments.length > 0 &&
          item.attachments[0].url
        ) {
          image = item.attachments[0].url;
        }

        const source = hostToSourceLabel(host) || author || "Onbekende bron";

        return {
          title,
          link,
          description,
          pubDate,
          author,
          source,
          image,
          host,
        };
      }

      function updateSourceTriggerText() {
        const textEl = document.getElementById("sourceTriggerText");

        if (activeSources.size === 0) {
          textEl.textContent = "Alle bronnen";
        } else if (activeSources.size === 1) {
          textEl.textContent = [...activeSources][0];
        } else {
          textEl.textContent =
            `${activeSources.size} bronnen geselecteerd`;
        }
      }

      function buildSourceDropdown(articles) {
        const trigger = document.getElementById("sourceTrigger");
        const panel = document.getElementById("sourcePanel");
        const optionsEl = document.getElementById("sourceOptions");
        const selectAllButton = document.getElementById("sourceSelectAll");
        const clearButton = document.getElementById("sourceClear");

        const allSources = [
          ...new Set(
            articles
              .map((article) => article.source)
              .filter(Boolean)
          ),
        ].sort((a, b) => a.localeCompare(b, "nl"));

        optionsEl.innerHTML = "";

        allSources.forEach((source) => {
          const row = document.createElement("label");
          row.className = "multi-option";

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.value = source;
          checkbox.checked = activeSources.has(source);

          checkbox.addEventListener("change", () => {
            if (checkbox.checked) {
              activeSources.add(source);
            } else {
              activeSources.delete(source);
            }

            updateSourceTriggerText();
            renderArticles();
          });

          const text = document.createElement("span");
          text.textContent = source;

          row.appendChild(checkbox);
          row.appendChild(text);
          optionsEl.appendChild(row);
        });

        function openPanel() {
          panel.hidden = false;
          trigger.setAttribute("aria-expanded", "true");
        }

        function closePanel() {
          panel.hidden = true;
          trigger.setAttribute("aria-expanded", "false");
        }

        trigger.addEventListener("click", (event) => {
          event.stopPropagation();

          if (panel.hidden) {
            openPanel();
          } else {
            closePanel();
          }
        });

        document.addEventListener("click", closePanel);
        panel.addEventListener("click", (event) => event.stopPropagation());

        selectAllButton.addEventListener("click", () => {
          activeSources = new Set(allSources);

          optionsEl
            .querySelectorAll('input[type="checkbox"]')
            .forEach((checkbox) => {
              checkbox.checked = true;
            });

          updateSourceTriggerText();
          renderArticles();
        });

        clearButton.addEventListener("click", () => {
          activeSources.clear();

          optionsEl
            .querySelectorAll('input[type="checkbox"]')
            .forEach((checkbox) => {
              checkbox.checked = false;
            });

          updateSourceTriggerText();
          renderArticles();
        });

        updateSourceTriggerText();
      }

      function setupSearch() {
        const input = document.getElementById("searchInput");

        input.addEventListener("input", (event) => {
          searchQuery = event.target.value.trim().toLowerCase();
          renderArticles();
        });
      }

      function renderArticles() {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";

        const filtered = allArticles.filter((article) => {
          if (
            activeSources.size > 0 &&
            !activeSources.has(article.source)
          ) {
            return false;
          }

          if (searchQuery) {
            const searchableText = [
              article.title,
              article.description,
              article.author,
              article.source,
            ]
              .join(" ")
              .toLowerCase();

            if (!searchableText.includes(searchQuery)) {
              return false;
            }
          }

          return true;
        });

        const hostCounts = {};
        const limited = [];

        filtered.forEach((article) => {
          const host = article.host || "unknown";
          hostCounts[host] = hostCounts[host] || 0;

          if (hostCounts[host] < MAX_PER_HOST) {
            hostCounts[host] += 1;
            limited.push(article);
          }
        });

        limited.forEach((article) => {
          grid.appendChild(createCard(article));
        });

        const statusEl = document.getElementById("status");

        if (limited.length === 0 && allArticles.length > 0) {
          statusEl.textContent =
            "Geen artikelen voldoen aan de gekozen filters.";
        } else if (allArticles.length > 0) {
          statusEl.textContent =
            `Weergegeven: ${limited.length} van ${allArticles.length} artikelen.`;
          statusEl.classList.remove("error");
        }
      }

      function createCard(article) {
        const card = document.createElement("article");
        card.className = "card";
        card.tabIndex = 0;
        card.setAttribute("role", "link");

        const openArticle = () => {
          window.open(article.link, "_blank", "noopener,noreferrer");
        };

        card.addEventListener("click", openArticle);
        card.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            openArticle();
          }
        });

        if (article.image) {
          const image = document.createElement("div");
          image.className = "card-image";
          image.style.backgroundImage = `url("${article.image}")`;
          card.appendChild(image);
        }

        const content = document.createElement("div");
        content.className = "card-content";

        const title = document.createElement("h2");
        title.className = "card-title";
        title.textContent = article.title;
        content.appendChild(title);

        const meta = document.createElement("div");
        meta.className = "card-meta";

        if (article.pubDate) {
          const date = document.createElement("span");
          date.textContent = new Date(article.pubDate).toLocaleDateString(
            "nl-NL",
            {
              year: "numeric",
              month: "short",
              day: "numeric",
            }
          );
          meta.appendChild(date);
        }

        content.appendChild(meta);

        if (article.description) {
          const description = document.createElement("p");
          description.className = "card-description";
          description.textContent =
            article.description.length > 220
              ? `${article.description.slice(0, 220)}…`
              : article.description;
          content.appendChild(description);
        }

        const bottomRow = document.createElement("div");
        bottomRow.className = "card-bottom";

        if (article.source) {
          const sourceChip = document.createElement("span");
          sourceChip.className = "card-source-chip";
          sourceChip.textContent = article.source;
          sourceChip.title = article.source;
          bottomRow.appendChild(sourceChip);
        }

        const readMore = document.createElement("a");
        readMore.className = "card-readmore";
        readMore.href = article.link;
        readMore.target = "_blank";
        readMore.rel = "noopener noreferrer";
        readMore.textContent = "Lees meer →";
        readMore.addEventListener("click", (event) =>
          event.stopPropagation()
        );

        bottomRow.appendChild(readMore);
        content.appendChild(bottomRow);
        card.appendChild(content);

        return card;
      }
    </script>

    <script
      async
      src="https://scripts.simpleanalyticscdn.com/latest.js"
    ></script>
  </body>
</html>
